<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Culture 서비스 핵심 가치</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS resets and modern variables */
        :root {
            --bg-color: #0f111a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --accent-1: #4facfe;
            --accent-2: #00f2fe;
            --accent-3: #f093fb;
            --accent-4: #f5576c;
            --accent-5: #43e97b;
            --accent-6: #38f9d7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(245, 87, 108, 0.15), transparent 25%);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            width: 100%;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .section-desc {
            font-size: 1.125rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            word-break: keep-all;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0) 50%
            );
            z-index: 1;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Hover glows for specific cards */
        .card:nth-child(1):hover {
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.15);
        }
        .card:nth-child(2):hover {
            box-shadow: 0 20px 40px rgba(240, 147, 251, 0.15);
        }
        .card:nth-child(3):hover {
            box-shadow: 0 20px 40px rgba(67, 233, 123, 0.15);
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* Discover */
        .card:nth-child(1) .icon-wrapper {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        }
        
        /* Share */
        .card:nth-child(2) .icon-wrapper {
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
        }

        /* Guide */
        .card:nth-child(3) .icon-wrapper {
            background: linear-gradient(135deg, var(--accent-5), var(--accent-6));
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
            color: #fff;
        }

        .card-desc {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.6;
            position: relative;
            z-index: 2;
            word-break: keep-all;
        }

        /* Decorative elements inside cards */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.15;
            z-index: 0;
            transition: all 0.5s ease;
        }

        .card:nth-child(1) .decor-circle {
            width: 150px;
            height: 150px;
            background: var(--accent-1);
            top: -20px;
            right: -20px;
        }

        .card:nth-child(2) .decor-circle {
            width: 150px;
            height: 150px;
            background: var(--accent-4);
            bottom: -20px;
            left: -20px;
        }

        .card:nth-child(3) .decor-circle {
            width: 150px;
            height: 150px;
            background: var(--accent-5);
            top: 50%;
            right: -50px;
            transform: translateY(-50%);
        }

        .card:hover .decor-circle {
            opacity: 0.3;
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">K-Culture Explorer 핵심 가치</h2>
            <p class="section-desc">우리는 한국 문화유산의 아름다움을 더 넓은 세상과 나누기 위해 만들어졌습니다.</p>
        </div>

        <div class="cards-grid">
            <!-- 1. 발견 (Discover) -->
            <div class="card">
                <div class="decor-circle"></div>
                <div class="icon-wrapper">
                    🏛️
                </div>
                <h3 class="card-title">발견 (Discover)</h3>
                <p class="card-desc">한국 문화유산의 숨겨진 매력을 쉽고 깊이 있게 소개하여 새로운 가치를 발견하게 합니다.</p>
            </div>

            <!-- 2. 공유 (Share) -->
            <div class="card">
                <div class="decor-circle"></div>
                <div class="icon-wrapper">
                    📝
                </div>
                <h3 class="card-title">공유 (Share)</h3>
                <p class="card-desc">실제 탐방 후기와 고품질 사진을 통해 전 세계인들과 생생한 경험을 공유합니다.</p>
            </div>

            <!-- 3. 안내 (Guide) -->
            <div class="card">
                <div class="decor-circle"></div>
                <div class="icon-wrapper">
                    🗺️
                </div>
                <h3 class="card-title">안내 (Guide)</h3>
                <p class="card-desc">AI 기반 맞춤형 루트 추천 및 체계적인 준비 가이드로 최적의 탐방을 안내합니다.</p>
            </div>
        </div>
    </div>

    <script>
        // 간단한 등장 애니메이션 (Intersection Observer)
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.card');
            
            const observerOptions = {
                threshold: 0.1,
                rootMargin: "0px 0px -50px 0px"
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.style.opacity = '1';
                            entry.target.style.transform = 'translateY(0)';
                        }, index * 150); // 순차적 애니메이션
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            cards.forEach((card, index) => {
                // 초기 상태 설정
                card.style.opacity = '0';
                card.style.transform = 'translateY(30px)';
                card.style.transition = 'opacity 0.6s ease-out, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                observer.observe(card);
            });
        });
    </script>
</body>
</html>
