<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서비스 기획자 에이전트 | Service Planner Agent</title>
    <meta name="description" content="AI 기반 서비스 기획 전문 에이전트. 아이디어 브레인스토밍, 페르소나 작성, 기능 명세서, 시장 분석을 도와드립니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 사이드바 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🎯</span>
                    <h1>기획자 에이전트</h1>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="사이드바 토글">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- 모델 선택 -->
            <div class="model-selector">
                <label class="section-label">AI 모델 선택</label>
                <div class="model-dropdown" id="modelDropdown">
                    <button class="model-selected" id="modelSelected">
                        <span class="model-icon">🟢</span>
                        <span class="model-name">GPT-4o</span>
                        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="model-options" id="modelOptions"></div>
                </div>
            </div>

            <!-- 빠른 액션 -->
            <div class="quick-actions">
                <label class="section-label">빠른 액션</label>
                <button class="action-btn" data-action="brainstorm" id="action-brainstorm">
                    <span class="action-icon">🧠</span>
                    <div class="action-info">
                        <span class="action-title">아이디어 브레인스토밍</span>
                        <span class="action-desc">혁신적인 서비스 아이디어 제안</span>
                    </div>
                </button>
                <button class="action-btn" data-action="persona" id="action-persona">
                    <span class="action-icon">👤</span>
                    <div class="action-info">
                        <span class="action-title">사용자 페르소나</span>
                        <span class="action-desc">타겟 유저 프로필 작성</span>
                    </div>
                </button>
                <button class="action-btn" data-action="spec" id="action-spec">
                    <span class="action-icon">📋</span>
                    <div class="action-info">
                        <span class="action-title">기능 명세서</span>
                        <span class="action-desc">서비스 기능 정의 및 상세화</span>
                    </div>
                </button>
                <button class="action-btn" data-action="market" id="action-market">
                    <span class="action-icon">📊</span>
                    <div class="action-info">
                        <span class="action-title">시장 분석</span>
                        <span class="action-desc">시장 규모 및 경쟁사 분석</span>
                    </div>
                </button>
            </div>

            <!-- 하단 컨트롤 -->
            <div class="sidebar-footer">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    새 대화 시작
                </button>
            </div>
        </aside>

        <!-- 메인 채팅 영역 -->
        <main class="chat-main">
            <!-- 모바일 헤더 -->
            <header class="mobile-header">
                <button class="menu-btn" id="menuBtn" aria-label="메뉴">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h2>기획자 에이전트</h2>
                <div class="model-badge" id="modelBadge">GPT-4o</div>
            </header>

            <!-- 메시지 영역 -->
            <div class="messages-container" id="messagesContainer">
                <!-- 웰컴 스크린 -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">🎯</div>
                    <h2>서비스 기획자 에이전트</h2>
                    <p>서비스 기획에 대한 모든 것을 도와드립니다.<br>아이디어 구상부터 시장 분석까지, 함께 만들어가요.</p>
                    <div class="welcome-cards">
                        <button class="welcome-card" data-action="brainstorm">
                            <span class="card-icon">🧠</span>
                            <span class="card-title">아이디어 브레인스토밍</span>
                            <span class="card-desc">트렌드 기반 혁신 아이디어</span>
                        </button>
                        <button class="welcome-card" data-action="persona">
                            <span class="card-icon">👤</span>
                            <span class="card-title">페르소나 작성</span>
                            <span class="card-desc">타겟 사용자 프로필링</span>
                        </button>
                        <button class="welcome-card" data-action="spec">
                            <span class="card-icon">📋</span>
                            <span class="card-title">기능 명세서</span>
                            <span class="card-desc">MVP 기능 설계</span>
                        </button>
                        <button class="welcome-card" data-action="market">
                            <span class="card-icon">📊</span>
                            <span class="card-title">시장 분석</span>
                            <span class="card-desc">TAM/SAM/SOM 분석</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 입력 영역 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        placeholder="서비스 기획에 대해 물어보세요..."
                        rows="1"
                        autofocus
                    ></textarea>
                    <button class="send-btn" id="sendBtn" aria-label="전송">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</p>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
